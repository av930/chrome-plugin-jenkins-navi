<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jenkins Labels</title>
  <link rel="stylesheet" href="label_page.css">
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Jenkins Navigator</p>
        <h1 id="pageTitle">Jenkins Labels</h1>
        <p class="subtitle" id="pageSubtitle">Loading Jenkins label data...</p>
        <p class="page-status" id="pageStatus"></p>
      </div>
      <div class="header-actions">
        <button id="refreshButton" class="secondary-btn" type="button">Refresh</button>
        <a id="nodeLink" class="primary-link" href="#">Open Nodes</a>
      </div>
    </header>

    <section class="summary-row">
      <article class="summary-card">
        <span class="summary-label">Server</span>
        <strong id="serverName">-</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">Labels</span>
        <strong id="labelCount">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">Nodes</span>
        <strong id="nodeCount">0</strong>
        <p class="summary-meta" id="nodeStatusSummary"></p>
      </article>
      <article class="summary-card">
        <span class="summary-label">Frequent Nodes Top3</span>
        <div class="summary-list" id="frequentNodes">-</div>
      </article>
    </section>
    <section id="labelGrid" class="label-grid" aria-live="polite"></section>
  </div>

  <script src="label_page.js"></script>
</body>
</html>
